<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OBSIDIAN</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0e0e0e; color: #f5f5f5;
    font: 14px/1.4 -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .stage { text-align: center; max-width: 480px; padding: 32px; }
  .monogram {
    width: 72px; height: 72px; margin: 0 auto 16px;
    background: #e10600; color: #fff;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font: 800 44px/1 -apple-system, system-ui, sans-serif;
    letter-spacing: -2px;
  }
  .wordmark { font: 700 22px/1 -apple-system, system-ui, sans-serif; letter-spacing: 4px; margin-bottom: 8px; }
  .status { opacity: 0.7; margin-top: 24px; font-size: 13px; }
  .err { color: #ff6b6b; margin-top: 18px; font-size: 13px; line-height: 1.6; }
  a { color: #f5a623; }
</style>
</head>
<body>
<div class="stage">
  <div class="monogram">O</div>
  <div class="wordmark">OBSIDIAN</div>
  <div class="status" id="status">Connecting to server…</div>
  <div class="err" id="err" style="display:none"></div>
</div>
<script>
// OBSIDIAN — permanent landing page.
// Fetches the current live tunnel URL from the gist (which the server keeps
// up to date every 30s), then redirects the WebView to /app/ on that URL.
// Capacitor's server.url points here permanently, so the APK never needs
// rebuilding when the Cloudflare quick tunnel rotates.
(async () => {
  const GIST = 'https://gist.githubusercontent.com/gismifrah-cmyk/bf79b17df13603b4a08d418566e5a082/raw/obsidian-url.txt';
  const status = document.getElementById('status');
  const err = document.getElementById('err');
  function fail(msg) {
    status.textContent = '';
    err.style.display = 'block';
    err.innerHTML = msg + '<br><br>This usually means the OBSIDIAN server is offline or the URL publisher hasn’t pushed yet. Try again in a minute.';
  }
  try {
    status.textContent = 'Finding the live server…';
    const r = await fetch(GIST, { cache: 'no-store' });
    if (!r.ok) return fail('Could not reach the URL service (HTTP ' + r.status + ').');
    const url = (await r.text()).trim();
    if (!/^https?:\/\//i.test(url)) return fail('URL service returned an unexpected value.');
    status.textContent = 'Connecting…';
    // /app/ is where the server hosts the renderer (express.static rendererDir).
    location.replace(url.replace(/\/+$/, '') + '/app/');
  } catch (e) {
    fail('Could not reach the URL service: ' + (e && e.message || e));
  }
})();
</script>
</body>
</html>
